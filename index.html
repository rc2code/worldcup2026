<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup 2026 Schedule</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
        .loading {
            font-size: 1.2em;
            font-weight: bold;
        }
        #filterContainer {
            margin-top: 10px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<h1>World Cup 2026 Schedule</h1>

<div id="filterContainer">
    <label for="watchedFilter"><strong>Filter:</strong></label>
    <select id="watchedFilter">
        <option value="all" selected>Show All Matches</option>
        <option value="watched">Show Watched Only</option>
        <option value="unwatched">Show Unwatched Only</option>
    </select>
</div>

<div id="loading" class="loading">Loading schedule…</div>

<table id="scheduleTable" style="display:none;">
    <thead>
        <tr>
            <th>Stage</th>
            <th>Day</th>
            <th>Date</th>
            <th>Time (ET)</th>
            <th>Time (MDT)</th>
            <th>Team 1</th>
            <th>Team 1 Score</th>
            <th>Team 2</th>
            <th>Team 2 Score</th>
            <th>Location</th>
            <th>Watched</th>
            <th>Network</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script>
// Load PapaParse locally
const papaScript = document.createElement("script");
papaScript.src = "papaparse.min.js";
papaScript.onload = () => loadCSV();
document.head.appendChild(papaScript);

let fullData = []; // store all rows for filtering

function loadCSV() {
    Papa.parse("WorldCupSchedule-2026.csv", {
        download: true,
        header: true,
        complete: function(results) {
            fullData = results.data.filter(row => row.Stage); // remove empty rows
            renderTable(fullData);

            document.getElementById("loading").style.display = "none";
            document.getElementById("scheduleTable").style.display = "table";
        }
    });
}

function renderTable(data) {
    const tbody = document.querySelector("#scheduleTable tbody");
    tbody.innerHTML = ""; // clear existing rows

    data.forEach(row => {
        const tr = document.createElement("tr");

        tr.innerHTML = `
            <td>${row.Stage}</td>
            <td>${row.Day}</td>
            <td>${row.Date}</td>
            <td>${row["Time (ET)"]}</td>
            <td>${row["Time (MDT)"]}</td>
            <td>${row["Team 1"]}</td>
            <td>${row["Team 1 Score"] || ""}</td>
            <td>${row["Team 2"]}</td>
            <td>${row["Team 2 Score"] || ""}</td>
            <td>${row.Location}</td>
            <td>${row.Watched || ""}</td>
            <td>${row.Network}</td>
        `;

        tbody.appendChild(tr);
    });
}

// Filter logic
document.getElementById("watchedFilter").addEventListener("change", function() {
    const filter = this.value;

    if (filter === "all") {
        renderTable(fullData);
    } else if (filter === "watched") {
        renderTable(fullData.filter(row => (row.Watched || "").toUpperCase() === "YES"));
    } else if (filter === "unwatched") {
        renderTable(fullData.filter(row => !row.Watched || row.Watched.trim() === ""));
    }
});
</script>

</body>
</html>
