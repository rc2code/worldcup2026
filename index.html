<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>World Cup 2026 Schedule (CSV Optimized)</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    :root {
        --primary: #003366;
        --accent: #e31837;
        --today: #ffeb3b;
        --winner: #c8e6c9;
        --bg: #f4f4f4;
    }
    * { box-sizing: border-box; }
    body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        background: var(--bg);
        color: #222;
    }
    header {
        background: var(--primary);
        color: white;
        padding: 16px;
        text-align: center;
    }
    header h1 {
        margin: 0 0 4px 0;
        font-size: 1.6rem;
    }
    header p {
        margin: 0;
        font-size: 0.9rem;
        opacity: 0.85;
    }
    .container {
        padding: 10px;
        max-width: 1100px;
        margin: 0 auto;
    }
    .toc {
        background: white;
        padding: 16px;
        margin: 12px 0 20px 0;
        border-radius: 10px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.12);
    }
    .toc h2 {
        margin-top: 0;
        font-size: 1.2rem;
        border-bottom: 2px solid var(--primary);
        padding-bottom: 4px;
    }
    .toc a {
        display: inline-block;
        padding: 6px 10px;
        margin: 4px 6px 4px 0;
        font-size: 0.9rem;
        color: var(--primary);
        text-decoration: none;
        border-radius: 999px;
        border: 1px solid rgba(0,0,0,0.1);
        background: #fafafa;
    }
    .toc a:hover {
        background: #e6f0ff;
    }
    .stage-section {
        margin-bottom: 18px;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 2px 6px rgba(0,0,0,0.12);
        background: white;
    }
    .stage-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 14px;
        background: var(--primary);
        color: white;
        cursor: pointer;
    }
    .stage-header h2 {
        margin: 0;
        font-size: 1.1rem;
    }
    .stage-toggle {
        font-size: 0.9rem;
        opacity: 0.9;
    }
    .stage-body {
        display: none;
        padding: 0 10px 10px 10px;
    }
    .stage-body.open {
        display: block;
    }
    .table-wrapper {
        width: 100%;
        overflow-x: auto;
    }
    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 10px;
        background: white;
    }
    th, td {
        padding: 8px 6px;
        border-bottom: 1px solid #ddd;
        text-align: left;
        font-size: 0.85rem;
        white-space: nowrap;
    }
    th {
        background: #0b3f7a;
        color: white;
        position: sticky;
        top: 0;
        z-index: 1;
    }
    tr:hover {
        background: #f7f7f7;
    }
    .team-cell {
        display: flex;
        align-items: center;
        gap: 6px;
    }
    .team-flag {
        width: 20px;
        height: 14px;
        object-fit: cover;
        border-radius: 2px;
        border: 1px solid rgba(0,0,0,0.2);
    }
    .canada-row {
        border-left: 4px solid var(--accent);
        background: #fff5f6;
    }
    .canada-row td {
        position: relative;
    }
    .canada-row td:first-child::before {
        content: "🍁";
        position: absolute;
        left: -18px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 0.9rem;
    }
    .today-row {
        box-shadow: inset 0 0 0 2px var(--today);
        background: #fffde7;
    }
    .winner {
        background: var(--winner);
        font-weight: 600;
    }
    .meta {
        font-size: 0.8rem;
        color: #555;
        margin: 4px 0 0 0;
    }
    @media (max-width: 600px) {
        header h1 {
            font-size: 1.3rem;
        }
        .toc h2 {
            font-size: 1rem;
        }
        th, td {
            font-size: 0.78rem;
        }
        .stage-header h2 {
            font-size: 1rem;
        }
    }
</style>
</head>

<body>

<header>
    <h1>World Cup 2026 – Full Schedule</h1>
    <p>CSV‑backed • Canada highlighted • Today’s matches marked</p>
</header>

<div class="container">
    <div class="toc">
        <h2>Table of Contents</h2>
        <div id="toc-links">Loading…</div>
        <p class="meta" id="today-info"></p>
    </div>

    <div id="content"></div>
</div>

<script>
// CSV export link from OneDrive (replace with your CSV share link if different)
const csvUrl = "WorldCupSchedule-2026.csv";
// Map team names to ISO country codes for flagcdn.com
const teamToCode = {
    "Canada": "ca",
    "Mexico": "mx",
    "South Africa": "za",
    "Korea Republic": "kr",
    "Czechia": "cz",
    "Bosnia-Herzegovina": "ba",
    "USA": "us",
    "Qatar": "qa",
    "Switzerland": "ch",
    "Brazil": "br",
    "Morocco": "ma",
    "Haiti": "ht",
    "Scotland": "gb-sct",
    "Australia": "au",
    "Turkiye": "tr",
    "Turkey": "tr",
    "Germany": "de",
    "Curacao": "cw",
    "Netherlands": "nl",
    "Japan": "jp",
    "Cote d’Ivoire": "ci",
    "Cote dâ€™Ivoire": "ci",
    "Cote d' Ivoire": "ci",
    "Ecuador": "ec",
    "Sweden": "se",
    "Tunisia": "tn",
    "Spain": "es",
    "Cabo Verde": "cv",
    "Belgium": "be",
    "Egypt": "eg",
    "Saudi Arabia": "sa",
    "Uruguay": "uy",
    "Iran": "ir",
    "New Zealand": "nz",
    "France": "fr",
    "Senegal": "sn",
    "Iraq": "iq",
    "Norway": "no",
    "Argentina": "ar",
    "Algeria": "dz",
    "Austria": "at",
    "Jordan": "jo",
    "Portugal": "pt",
    "Congo DR": "cd",
    "England": "gb-eng",
    "Croatia": "hr",
    "Ghana": "gh",
    "Panama": "pa",
    "Uzbekistan": "uz",
    "Colombia": "co",
    "Paraguay": "py"
};

function getFlagUrl(team) {
    const code = teamToCode[team] || null;
    if (!code) return null;
    return `https://flagcdn.com/w40/${code}.png`;
}

function parseScore(value) {
    if (value === null || value === undefined || value === "") return null;
    const n = Number(value);
    return Number.isNaN(n) ? null : n;
}

function isToday(dateStr) {
    if (!dateStr) return false;
    const year = 2026;
    const d = new Date(`${dateStr}, ${year}`);
    if (isNaN(d.getTime())) return false;
    const today = new Date();
    return d.getFullYear() === today.getFullYear() &&
           d.getMonth() === today.getMonth() &&
           d.getDate() === today.getDate();
}

async function loadCsv() {
    const response = await fetch(csvUrl);
    const text = await response.text();
    const parsed = Papa.parse(text, { header: true, skipEmptyLines: true });
    const rows = parsed.data;
    buildPage(rows);
}

function buildPage(rows) {
    const stages = [...new Set(rows.map(r => r.Stage))].filter(Boolean);

    const tocDiv = document.getElementById("toc-links");
    tocDiv.innerHTML = stages.map(stage =>
        `<a href="#${stage.replace(/\s+/g,'_')}">${stage}</a>`
    ).join("");

    const today = new Date();
    const todayInfo = document.getElementById("today-info");
    todayInfo.textContent = `Today: ${today.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' })}`;

    const contentDiv = document.getElementById("content");
    contentDiv.innerHTML = "";

    stages.forEach((stage, index) => {
        const sectionRows = rows.filter(r => r.Stage === stage);

        const sectionId = stage.replace(/\s+/g,'_');
        const section = document.createElement("section");
        section.className = "stage-section";
        section.id = sectionId;

        const header = document.createElement("div");
        header.className = "stage-header";
        header.innerHTML = `
            <h2>${stage}</h2>
            <span class="stage-toggle">${index === 0 ? "▼ Collapse" : "► Expand"}</span>
        `;

        const body = document.createElement("div");
        body.className = "stage-body" + (index === 0 ? " open" : "");

        header.addEventListener("click", () => {
            const open = body.classList.toggle("open");
            header.querySelector(".stage-toggle").textContent = open ? "▼ Collapse" : "► Expand";
        });

        const wrapper = document.createElement("div");
        wrapper.className = "table-wrapper";

        let html = `
            <table>
                <thead>
                    <tr>
                        <th>Day</th>
                        <th>Date</th>
                        <th>Time (ET)</th>
                        <th>Time (MDT)</th>
                        <th>Team 1</th>
                        <th>Team 1 Score</th>
                        <th>Team 2</th>
                        <th>Team 2 Score</th>
                        <th>Location</th>
                        <th>Network</th>
                    </tr>
                </thead>
                <tbody>
        `;

        sectionRows.forEach(r => {
            const t1 = r["Team 1"];
            const t2 = r["Team 2"];
            const s1 = parseScore(r["Team 1 Score"]);
            const s2 = parseScore(r["Team 2 Score"]);

            let rowClasses = [];
            if (t1 === "Canada" || t2 === "Canada") rowClasses.push("canada-row");
            if (isToday(r.Date)) rowClasses.push("today-row");

            const t1Winner = s1 !== null && s2 !== null && s1 > s2;
            const t2Winner = s1 !== null && s2 !== null && s2 > s1;

            const t1Flag = getFlagUrl(t1);
            const t2Flag = getFlagUrl(t2);

            html += `
                <tr class="${rowClasses.join(" ")}">
                    <td>${r.Day || ""}</td>
                    <td>${r.Date || ""}</td>
                    <td>${r["Time (ET)"] || ""}</td>
                    <td>${r["Time (MDT)"] || ""}</td>
                    <td class="team-cell ${t1Winner ? "winner" : ""}">
                        ${t1Flag ? `<img class="team-flag" src="${t1Flag}" alt="${t1} flag">` : ""}
                        <span>${t1 || ""}</span>
                    </td>
                    <td class="${t1Winner ? "winner" : ""}">${r["Team 1 Score"] || ""}</td>
                    <td class="team-cell ${t2Winner ? "winner" : ""}">
                        ${t2Flag ? `<img class="team-flag" src="${t2Flag}" alt="${t2} flag">` : ""}
                        <span>${t2 || ""}</span>
                    </td>
                    <td class="${t2Winner ? "winner" : ""}">${r["Team 2 Score"] || ""}</td>
                    <td>${r.Location || ""}</td>
                    <td>${r.Network || ""}</td>
                </tr>
            `;
        });

        html += "</tbody></table>";
        wrapper.innerHTML = html;
        body.appendChild(wrapper);

        section.appendChild(header);
        section.appendChild(body);
        contentDiv.appendChild(section);
    });
}

// Load PapaParse then CSV
const papaScript = document.createElement("script");
papaScript.src = "https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js";
papaScript.onload = loadCsv;
document.body.appendChild(papaScript);
</script>

</body>
</html>
