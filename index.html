<!DOCTYPE html>
// Update 20260627 1413
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026 Schedule</title>

<style>
    body {
        font-family: Arial, sans-serif;
        margin: 20px;
    }

    h1 {
        margin-bottom: 10px;
    }

    #filterContainer {
        margin-bottom: 15px;
    }

    .stage-header {
        background-color: #e0e0e0;
        padding: 10px;
        cursor: pointer;
        margin-top: 20px;
        font-weight: bold;
        border-radius: 4px;
    }

    .stage-header:hover {
        background-color: #d6d6d6;
    }

    th {
    position: sticky;
    top: 0;
    z-index: 2;
    }

    .stage-content {
        display: none;
        margin-bottom: 20px;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 10px;
    }

    th, td {
        border: 1px solid #ccc;
        padding: 6px;
        text-align: left;
        font-size: 14px;
    }

    th {
        background-color: #f2f2f2;
    }

    .winner {
        font-weight: bold;
        background-color: #d4ffd4;
    }

    .canada-match {
        background-color: #e0f0ff;
    }

    .today-match {
        background-color: #fff3cd;
    }

    .flag {
        height: 20px;
        vertical-align: middle;
        margin-right: 6px;
    }

    .loading {
        font-size: 1.2em;
        font-weight: bold;
    }

/* Prevent wrapping on mobile */
    td, th {
        white-space: nowrap;
    }

/* Allow horizontal scroll if needed */
    table {
        display: block;
        overflow-x: auto;
    }

/* Reduce padding on small screens */
    @media (max-width: 600px) {
        td, th {
            padding: 4px;
            font-size: 12px;
        }
        .flag {
            height: 16px;
            margin-right: 4px;
        }
    }
    
</style>
</head>

<body>

<h1>World Cup 2026 Schedule</h1>

<div id="filterContainer">
    <label for="watchedFilter"><strong>Filter:</strong></label>
    <select id="watchedFilter">
        <option value="all" selected>Show All Matches</option>
        <option value="watched">Show Watched Only</option>
        <option value="unwatched">Show Unwatched Only</option>
    </select>
</div>

<button id="showTodayBtn" style="margin-left:10px;">Show Today’s Matches</button>

<button id="showAllBtn" style="margin-left:5px;">Show All</button>

<div id="loading" class="loading">Loading schedule…</div>

<div id="scheduleContainer"></div>

<script>
// Load PapaParse locally
const papaScript = document.createElement("script");
papaScript.src = "papaparse.min.js";
papaScript.onload = () => loadCSV();
document.head.appendChild(papaScript);

// -------------------------
// SHOW ALL MATCHES
// -------------------------
document.getElementById("showAllBtn").addEventListener("click", function () {
    renderSchedule(fullData);
});
    
// -------------------------
// FILTER TODAY'S MATCHES
// -------------------------
document.getElementById("showTodayBtn").addEventListener("click", function () {
    const today = new Date().toDateString();

    const todaysMatches = fullData.filter(row => {
        const rowDate = new Date(row.Date + " 2026").toDateString();
        return rowDate === today;
    });

    renderSchedule(todaysMatches);
});
    
// -------------------------
// FLAG MAPPING (Version C)
// -------------------------
const teamToCode = {
    "Canada": "ca",
    "Mexico": "mx",
    "South Africa": "za",
    "Korea Republic": "kr",
    "Czechia": "cz",
    "Bosnia-Herzegovina": "ba",
    "USA": "us",
    "Qatar": "qa",
    "Switzerland": "ch",
    "Brazil": "br",
    "Morocco": "ma",
    "Haiti": "ht",
    "Scotland": "gb-sct",
    "Australia": "au",
    "Turkiye": "tr",
    "Turkey": "tr",
    "Germany": "de",
    "Curacao": "cw",
    "Netherlands": "nl",
    "Japan": "jp",
    "Cote d’Ivoire": "ci",
    "Cote dâ€™Ivoire": "ci",
    "Cote d' Ivoire": "ci",
    "Ivory Coast": "ci",
    "Ecuador": "ec",
    "Sweden": "se",
    "Tunisia": "tn",
    "Spain": "es",
    "Cabo Verde": "cv",
    "Belgium": "be",
    "Egypt": "eg",
    "Saudi Arabia": "sa",
    "Uruguay": "uy",
    "Iran": "ir",
    "New Zealand": "nz",
    "France": "fr",
    "Senegal": "sn",
    "Iraq": "iq",
    "Norway": "no",
    "Argentina": "ar",
    "Algeria": "dz",
    "Austria": "at",
    "Jordan": "jo",
    "Portugal": "pt",
    "Congo DR": "cd",
    "England": "gb-eng",
    "Croatia": "hr",
    "Ghana": "gh",
    "Panama": "pa",
    "Uzbekistan": "uz",
    "Colombia": "co",
    "Paraguay": "py"
};

// Special flags for non‑sovereign regions (SVG)
const specialFlagOverrides = {
    "gb-sct": "https://flagcdn.com/gb-sct.svg",
    "gb-eng": "https://flagcdn.com/gb-eng.svg"
};

function getFlagUrl(team) {
    const code = teamToCode[team];
    if (!code) return null;

    // Special override for Scotland/England
    if (specialFlagOverrides[code]) {
        return specialFlagOverrides[code];
    }

    // Default SVG flag
    return `https://flagcdn.com/${code}.svg`;
}

// -------------------------
// CSV LOADING
// -------------------------
let fullData = [];

function loadCSV() {
    Papa.parse("WorldCupSchedule-2026.csv", {
        download: true,
        header: true,
        complete: function(results) {
            fullData = results.data.filter(r => r.Stage);
            renderSchedule(fullData);
            document.getElementById("loading").style.display = "none";
        }
    });
}
    
// -------------------------
// CONVERT TO MT
// -------------------------
function convertETtoMT(etTime) {
    if (!etTime) return "";

    // Split "7:00 PM" into ["7:00", "PM"]
    const parts = etTime.trim().split(" ");
    if (parts.length !== 2) return "";

    const time = parts[0];
    const ampm = parts[1].toUpperCase();

    let [hour, minute] = time.split(":").map(Number);

    // Convert to 24-hour ET
    if (ampm === "PM" && hour !== 12) hour += 12;
    if (ampm === "AM" && hour === 12) hour = 0;

    // Convert ET → MT (subtract 2 hours)
    hour -= 2;

    // Handle wrap-around
    if (hour < 0) hour += 24;

    // Convert back to 12-hour format
    const mtAmpm = hour >= 12 ? "PM" : "AM";
    const mtHour = ((hour + 11) % 12) + 1;

    const mtMinute = minute.toString().padStart(2, "0");

    return `${mtHour}:${mtMinute} ${mtAmpm}`;
}
  
// -------------------------
// RENDERING
// -------------------------
function renderSchedule(data) {
    const container = document.getElementById("scheduleContainer");
    container.innerHTML = "";

    const stages = [...new Set(data.map(row => row.Stage))];

    const today = new Date().toDateString();

    stages.forEach(stage => {
        const header = document.createElement("div");
        header.className = "stage-header";
        header.textContent = stage;

        const content = document.createElement("div");
        content.className = "stage-content";

        const table = document.createElement("table");
        table.innerHTML = `
            <thead>
                <tr>
                    <th>Day</th>
                    <th>Date</th>
                    <th>Time (ET)</th>
                    <th>Time (MT)</th>
                    <th>Team 1</th>
                    <th>Score</th>
                    <th>Team 2</th>
                    <th>Score</th>
                    <th>Location</th>
                    <th>Watched</th>
                    <th>Network</th>
                </tr>
            </thead>
            <tbody></tbody>
        `;

        const tbody = table.querySelector("tbody");

        data.filter(r => r.Stage === stage).forEach(row => {
            const tr = document.createElement("tr");

            const rowDate = new Date(row.Date + " 2026").toDateString();
            const isToday = rowDate === today;
            const isCanada = row["Team 1"] === "Canada" || row["Team 2"] === "Canada";

            if (isToday) tr.classList.add("today-match");
            if (isCanada) tr.classList.add("canada-match");

            const t1Score = row["Team 1 Score"];
            const t2Score = row["Team 2 Score"];

            let t1Class = "";
            let t2Class = "";

            if (t1Score && t2Score) {
                if (parseInt(t1Score) > parseInt(t2Score)) t1Class = "winner";
                if (parseInt(t2Score) > parseInt(t1Score)) t2Class = "winner";
            }

            const flag1 = getFlagUrl(row["Team 1"]);
            const flag2 = getFlagUrl(row["Team 2"]);

            tr.innerHTML = `
                <td>${row.Day}</td>
                <td>${row.Date}</td>
                <td>${row["Time (ET)"]}</td>
                <td>${convertETtoMT(row["Time (ET)"])}</td>
                <td>${flag1 ? `<img class="flag" src="${flag1}">` : ""}${row["Team 1"]}</td>
                <td class="${t1Class}">${t1Score || ""}</td>
                <td>${flag2 ? `<img class="flag" src="${flag2}">` : ""}${row["Team 2"]}</td>
                <td class="${t2Class}">${t2Score || ""}</td>
                <td>${row.Location}</td>
                <td>${row.Watched || ""}</td>
                <td>${row.Network}</td>
            `;

            tbody.appendChild(tr);
        });

        content.appendChild(table);
        container.appendChild(header);
        container.appendChild(content);

        header.onclick = function () {
            content.style.display = content.style.display === "none" ? "block" : "none";
        };    

    });
}

// -------------------------
// FILTERING
// -------------------------
document.getElementById("watchedFilter").addEventListener("change", function() {
    const filter = this.value;

    if (filter === "all") {
        renderSchedule(fullData);
    } else if (filter === "watched") {
        renderSchedule(fullData.filter(r => (r.Watched || "").toUpperCase() === "YES"));
    } else if (filter === "unwatched") {
        renderSchedule(fullData.filter(r => !r.Watched || r.Watched.trim() === ""));
    }
});
</script>

</body>
</html>
